name: Run Telegram Bot

on:
workflow_dispatch:
push:
branches:
- main

jobs:
run-bot:
runs-on: ubuntu-latest
timeout-minutes: 360

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"
      cache: "pip"

  - name: Install system dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        build-essential \
        gcc \
        wget \
        curl \
        golang-go

  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Install Playwright Chromium
    run: |
      playwright install --with-deps chromium

  - name: Setup Go module and install dependencies
    working-directory: .
    run: |
      if [ ! -f go.mod ]; then
        go mod init tls_proxy
      fi

      go get github.com/refraction-networking/utls
      go mod tidy

  - name: Build TLS proxy
    run: |
      go build -o tls_proxy tls_proxy.go
      chmod +x tls_proxy

  - name: Verify files
    run: |
      echo "Files:"
      ls -la
      echo "TLS proxy:"
      file tls_proxy

  - name: Run Telegram Bot
    env:
      PYTHONUNBUFFERED: "1"
    run: |
      python YTmax.py
